<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今天吃什麼？｜午餐強迫妥協轉盤</title>
  <!-- 載入年輕感十足的圓體字型 -->
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* 1. 韓系暖色調風格變數 */
    :root {
      --warm-primary: #FF6B6B;    /* 活潑珊瑚紅 */
      --warm-secondary: #FF9F43;  /* 陽光暖橙 */
      --warm-accent: #FFC048;     /* 柔和芥末黃 */
      --bg-gradient-1: #FFF5EE;   /* 燕麥暖白 */
      --bg-gradient-2: #FFE4E1;   /* 柔粉蜜桃 */
      --card-bg: #FFFFFF;         /* 純白卡片 */
      --text-main: #4A3E3D;       /* 質感深褐（比純黑更溫柔） */
      --text-muted: #8B7E7D;      /* 輕柔灰褐 */
    }

    * {
      box-sizing: border-box;
      font-family: 'M PLUS Rounded 1c', "Noto Sans TC", sans-serif;
      font-weight: 500;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      color: var(--text-main);
    }

    /* 2. 標題區塊（簡潔精緻，無陰影） */
    .header-container {
      text-align: center;
      margin-bottom: 35px;
    }

    .tag {
      font-size: 0.85rem;
      color: var(--warm-primary);
      background: rgba(214, 107, 107, 0.1);
      padding: 6px 16px;
      border-radius: 30px;
      font-weight: 700;
      letter-spacing: 1px;
      display: inline-block;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 2.3rem;
      font-weight: 900;
      color: var(--text-main);
      margin: 0;
      letter-spacing: -0.5px;
    }

    /* 3. 現代感主版面 */
    .main-layout {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      max-width: 950px;
      width: 100%;
    }

    /* 輸入控制面板 */
    .control-panel {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 28px;
      width: 340px;
      box-shadow: 0 10px 30px rgba(74, 62, 61, 0.05);
    }

    .panel-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #EFEAE6;
      border-radius: 14px;
      font-size: 0.95rem;
      background: #FAFAFA;
      color: var(--text-main);
      outline: none;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus {
      border-color: var(--warm-primary);
      background: #FFFFFF;
    }

    button {
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-add {
      background: var(--warm-primary);
      color: white;
      padding: 0 20px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .btn-add:hover {
      background: #FF5252;
      transform: translateY(-1px);
    }

    /* 質感選單列表 */
    .item-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 260px;
      overflow-y: auto;
    }

    .item-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      background: #FDFBF9;
      border: 1px solid #F5EFEA;
    }

    .item-list li span {
      font-size: 0.95rem;
    }

    .btn-delete {
      background: transparent;
      color: var(--text-muted);
      padding: 4px 8px;
      font-size: 0.85rem;
      border-radius: 8px;
    }

    .btn-delete:hover {
      color: var(--warm-primary);
      background: rgba(255, 107, 107, 0.08);
    }

    /* 4. 精緻轉盤區 */
    .wheel-container {
      position: relative;
      width: 380px;
      height: 380px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 質感水滴型指針 */
    .pointer {
      position: absolute;
      top: -10px;
      width: 24px;
      height: 34px;
      background: var(--warm-primary);
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      z-index: 10;
      clip-path: polygon(50% 0%, 100% 50%, 100% 100%, 0% 100%, 0% 50%);
      transform: rotate(180deg); /* 讓尖端朝下 */
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    canvas {
      background: var(--card-bg);
      border-radius: 50%;
      box-shadow: 0 15px 40px rgba(74, 62, 61, 0.08);
    }

    /* 轉盤中央時尚圓形鈕 */
    .btn-spin {
      position: absolute;
      width: 85px;
      height: 85px;
      background: var(--card-bg);
      color: var(--text-main);
      border-radius: 50%;
      font-size: 1.1rem;
      font-weight: 700;
      box-shadow: 0 8px 25px rgba(74, 62, 61, 0.12);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn-spin:hover {
      transform: scale(1.05);
      color: var(--warm-primary);
    }

    /* 5. 輕奢感彈跳視窗 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(74, 62, 61, 0.3);
      backdrop-filter: blur(6px); /* 網頁模糊流玻璃效果 */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 35px 40px;
      text-align: center;
      max-width: 400px;
      width: 85%;
      box-shadow: 0 20px 50px rgba(74, 62, 61, 0.15);
      transform: scale(0.8);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-title {
      font-size: 0.95rem;
      color: var(--text-muted);
      letter-spacing: 1px;
      font-weight: 700;
    }

    .result-name {
      font-size: 2.6rem;
      color: var(--warm-primary);
      margin: 20px 0;
      font-weight: 900;
    }

    .btn-close {
      background: var(--text-main);
      color: white;
      padding: 12px 35px;
      font-size: 0.95rem;
      border-radius: 50px;
      font-weight: 700;
    }

    .btn-close:hover {
      background: var(--warm-primary);
      transform: translateY(-1px);
    }

    /* Emoji 爆炸粒子樣式 */
    .emoji-particle {
      position: fixed;
      pointer-events: none;
      font-size: 2.2rem;
      z-index: 101;
      animation: explode 2s forwards cubic-bezier(0.1, 0.8, 0.2, 1);
    }

    @keyframes explode {
      0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.3) rotate(var(--rot)); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- 標題區 -->
  <div class="header-container">
    <div class="tag">TODAY'S LUNCH</div>
    <h1>午餐強迫妥協輪盤</h1>
  </div>

  <!-- 主版面 -->
  <div class="main-layout">
    
    <!-- 左側控制面板 -->
    <div class="control-panel">
      <div class="panel-title">✨午餐選手✨</div>
      <div class="input-group">
        <input type="text" id="item-input" placeholder="想吃什麼？(限10字)" maxlength="10">
        <button class="btn-add" id="btn-add">加入</button>
      </div>
      <ul class="item-list" id="item-list"></ul>
    </div>

    <!-- 右側轉盤 -->
    <div class="wheel-container">
      <div class="pointer"></div>
      <canvas id="wheel-canvas" width="360" height="360"></canvas>
      <button class="btn-spin" id="btn-spin">GO!</button>
    </div>

  </div>

  <!-- 彈跳結果視窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-title">不要再選擇障礙了！今天就吃</div>
      <div class="result-name" id="result-name">...</div>
      <button class="btn-close" id="btn-close">GO！</button>
    </div>
  </div>

  <script>
    // 質感文青暖色系轉盤配色
    const colors = ['#FF8B8B', '#FFB38B', '#FFD38B', '#FFEAA7', '#FFAAA6', '#FFD3B6', '#D4A5A5', '#F3A683'];
    let items = ['麥當勞', '便利商店', '韓式料理', '早餐店', '便當', '越南河粉'];

    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');
    const itemList = document.getElementById('item-list');
    const itemInput = document.getElementById('item-input');
    const btnAdd = document.getElementById('btn-add');
    const btnSpin = document.getElementById('btn-spin');
    const modal = document.getElementById('modal-overlay');
    const resultName = document.getElementById('result-name');
    const btnClose = document.getElementById('btn-close');

    let currentAngle = 0; 
    let isSpinning = false;

    function init() {
      renderList();
      drawWheel(0);
    }

    function renderList() {
      itemList.innerHTML = '';
      items.forEach((item, index) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span>${item}</span>
          <button class="btn-delete" onclick="deleteItem(${index})">刪除</button>
        `;
        itemList.appendChild(li);
      });
    }

    function drawWheel(currentRotation) {
      const numSlices = items.length;
      const sliceAngle = (2 * Math.PI) / numSlices;
      const radius = canvas.width / 2;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(radius, radius);
      ctx.rotate(currentRotation);

      for (let i = 0; i < numSlices; i++) {
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius - 4, i * sliceAngle, (i + 1) * sliceAngle);
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        
        // 細緻的白邊間隔線
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#FFFFFF';
        ctx.stroke();

        ctx.save();
        ctx.rotate(i * sliceAngle + sliceAngle / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#4A3E3D';
        // 確保畫布上的字型也同步改為圓體
        ctx.font = 'bold 15px "M PLUS Rounded 1c", sans-serif';
        let text = items[i].length > 6 ? items[i].slice(0, 5) + '..' : items[i];
        ctx.fillText(text, radius - 25, 5);
        ctx.restore();
      }
      ctx.restore();
    }

    btnAdd.addEventListener('click', () => {
      const value = itemInput.value.trim();
      if (!value) return;
      items.push(value);
      itemInput.value = '';
      renderList();
      drawWheel(currentAngle);
    });

    window.deleteItem = function(index) {
      if (items.length <= 2) {
        alert('再少就沒得選啦！');
        return;
      }
      items.splice(index, 1);
      renderList();
      drawWheel(currentAngle);
    };

    btnSpin.addEventListener('click', () => {
      if (isSpinning) return;
      isSpinning = true;

      const spinCircles = 6 + Math.floor(Math.random() * 4); 
      const targetAngle = currentAngle + (spinCircles * 2 * Math.PI) + (Math.random() * 2 * Math.PI);
      
      const startTimestamp = performance.now();
      const duration = 4200; 

      function animateSpin(now) {
        const elapsed = now - startTimestamp;
        const progress = Math.min(elapsed / duration, 1);

        // 高級感流暢度減速 (Cubic Ease Out)
        const easeOut = 1 - Math.pow(1 - progress, 3);
        
        currentAngle = targetAngle * easeOut;
        drawWheel(currentAngle);

        if (progress < 1) {
          requestAnimationFrame(animateSpin);
        } else {
          isSpinning = false;
          determineWinner();
        }
      }
      requestAnimationFrame(animateSpin);
    });

    function determineWinner() {
      const numSlices = items.length;
      const sliceAngle = (2 * Math.PI) / numSlices;
      
      // 指針在正上方 (-90度 = 1.5 * PI)
      let normalizedAngle = (1.5 * Math.PI - currentAngle) % (2 * Math.PI);
      if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;

      const winnerIndex = Math.floor(normalizedAngle / sliceAngle) % numSlices;
      
      resultName.innerText = items[winnerIndex];
      modal.classList.add('active');
      
      triggerEmojiExplosion();
    }

    btnClose.addEventListener('click', () => {
      modal.classList.remove('active');
    });

    // 韓系少女感/食物爆炸粒子效果
    function triggerEmojiExplosion() {
      const modernEmojis = ['✨', '💖', '🍿', '🍰', '🥞', '🥨', '🥑', '🍕', '🌸', '🎉', '🎈'];
      const x = window.innerWidth / 2;
      const y = window.innerHeight / 2;

      for (let i = 0; i < 50; i++) {
        const p = document.createElement('div');
        p.className = 'emoji-particle';
        p.innerText = modernEmojis[Math.floor(Math.random() * modernEmojis.length)];
        
        const angle = Math.random() * Math.PI * 2;
        const distance = 120 + Math.random() * 220;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        const rot = 90 + Math.random() * 270;

        p.style.left = `${x}px`;
        p.style.top = `${y}px`;
        p.style.setProperty('--tx', `${tx}px`);
        p.style.setProperty('--ty', `${ty}px`);
        p.style.setProperty('--rot', `${rot}deg`);

        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    init();
  </script>
</body>
</html>
